<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Skill 2 Career</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,600;1,9..144,900&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- SITE NAV -->
  <div class="topbar">
    <a href="{{ url_for('about') }}" class="tb-logo">Skill<em>2</em>Career</a>
    <nav class="tb-nav">
      <a href="{{ url_for('auth.login') }}" class="tb-link">← Back to Login</a>
    </nav>
  </div>

  <div class="auth-simple-wrap">
    <div class="auth-simple-card">

      <div style="text-align:center; margin-bottom:28px;">
        <div style="font-size:2.4rem; margin-bottom:12px;">🔒</div>
        <h1 style="font-family:var(--serif); font-size:1.8rem; font-weight:900; color:var(--text); margin-bottom:8px;">Set New Password</h1>
        <p style="font-size:14px; color:var(--muted); line-height:1.6;">Resetting password for <strong style="color:var(--sage);">{{ email }}</strong></p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" style="margin-bottom:16px;">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-input" placeholder="Min 6 characters" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn" style="width:100%; justify-content:center; margin-top:8px;">
          Reset Password →
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted);">
        <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--sage); font-weight:600; text-decoration:none;">← Use a different email</a>
      </p>

    </div>
  </div>

</body>
</html>
