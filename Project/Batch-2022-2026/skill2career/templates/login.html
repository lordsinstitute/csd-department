<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Skill 2 Career</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,600&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: var(--font);
      min-height: 100vh;
      background: linear-gradient(160deg, #f8f6ff 0%, #f0f8f0 50%, #fff8f2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Logo */
    .auth-logo {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      text-decoration: none;
      display: block;
    }
    .auth-logo em { color: var(--sage); font-style: italic; }
    .auth-tagline {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }

    /* Card */
    .auth-card {
      background: #fff;
      border: 1px solid rgba(92,122,92,0.12);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(92,122,92,0.1);
    }

    .auth-title {
      font-family: var(--serif);
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }
    .auth-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(92,122,92,0.18);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: #fafaf8;
      outline: none;
      transition: border .2s, box-shadow .2s, background .2s;
    }
    .form-input:focus {
      border-color: var(--sage);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(92,122,92,0.08);
    }
    .form-input::placeholder { color: var(--dim); }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }
    .remember-row input { accent-color: var(--sage); }
    .forgot-link {
      font-size: 12px;
      font-weight: 700;
      color: var(--sage);
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--sage-g);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 16px rgba(92,122,92,0.25);
    }
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(92,122,92,0.32);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 12px;
      color: var(--dim);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: rgba(92,122,92,0.1);
    }

    .auth-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .auth-link a {
      color: var(--sage);
      font-weight: 700;
      text-decoration: none;
    }
    .auth-link a:hover { text-decoration: underline; }

    /* Flash messages */
    .flash-msg {
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .flash-error { background: rgba(220,38,38,0.07); color: #dc2626; border: 1px solid rgba(220,38,38,0.18); }
    .flash-success { background: rgba(92,122,92,0.08); color: var(--sage3); border: 1px solid rgba(92,122,92,0.2); }
    .flash-info { background: rgba(92,122,92,0.06); color: var(--sage); border: 1px solid var(--border); }
  </style>
</head>
<body>

  <a href="{{ url_for('about') }}" class="auth-logo">🌿 Skill<em>2</em>Career</a>
  <div class="auth-tagline">AI-Powered Career Matching</div>

  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to your account to continue</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-msg flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Your password" required autocomplete="current-password">
      </div>
      <div class="form-row">
        <div class="remember-row">
          <input type="checkbox" name="remember" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="auth-btn">Log In →</button>
    </form>

    <div class="divider">or</div>
    <div class="auth-link">
      Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up free</a>
    </div>
  </div>

</body>
</html>
